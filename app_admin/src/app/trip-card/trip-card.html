<div class="card m-2">

  <div class="card-header">
    {{ trip.name }}
  </div>

  <img src="http://localhost:3000/{{ trip.image }}" class="card-img-top">

  <div class="card-body">
    <h6>{{ trip.resort }}</h6>

    <p>
      {{ trip.length }} days — ${{ trip.perPerson }} per person
    </p>

    <p [innerHTML]="trip.description"></p>

    <ng-container *ngIf="isLoggedIn()">
      <button class="btn btn-primary w-100 mb-2" (click)="editTrip()">
        Edit Trip
      </button>
      <button class="btn btn-danger w-100" (click)="deleteTrip()">
        Delete Trip
      </button>
    </ng-container>

  </div>

</div>
