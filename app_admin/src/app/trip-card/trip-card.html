<div class="card m-2">

  <div class="card-header">
    {{ trip.name }}
  </div>

  <img src="assets/images/{{ trip.image }}" class="card-img-top">

  <div class="card-body">
    <h6>{{ trip.resort }}</h6>

    <p>
      {{ trip.length }} days — ${{ trip.perPerson }} per person
    </p>

    <p [innerHTML]="trip.description"></p>

    <button class="btn btn-primary w-100" (click)="editTrip()">
      Edit Trip
    </button>

  </div>

</div>
